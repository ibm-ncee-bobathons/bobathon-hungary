<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App — Built with Bob</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <!-- ── Header ─────────────────────────────────── -->
    <header>
      <h1>📝 Todo Application</h1>
      <p class="subtitle">Built with Bob AI Assistant</p>
    </header>

    <main>

      <!-- ── Add Todo Form ───────────────────────── -->
      <section class="card add-section">
        <h2>Add New Todo</h2>

        <form id="todo-form" novalidate>
          <div class="form-group">
            <label for="todo-title">Title <span class="required" aria-hidden="true">*</span></label>
            <input
              type="text"
              id="todo-title"
              name="title"
              placeholder="What needs to be done?"
              maxlength="200"
              autocomplete="off"
              required
            />
            <span class="field-error" id="title-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="todo-description">Description</label>
            <textarea
              id="todo-description"
              name="description"
              placeholder="Optional notes…"
              rows="3"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span class="btn-icon" aria-hidden="true">➕</span>
            Add Todo
          </button>
        </form>
      </section>

      <!-- ── Todo List ───────────────────────────── -->
      <section class="card list-section">
        <div class="list-header">
          <h2>My Todos</h2>
          <span class="badge" id="todo-count" aria-label="Todo count">0 todos</span>
        </div>

        <!-- Loading -->
        <div id="loading" class="state-view loading-view" aria-live="polite">
          <div class="spinner" role="status" aria-label="Loading"></div>
          <p>Loading todos…</p>
        </div>

        <!-- Empty -->
        <div id="empty-state" class="state-view empty-view" hidden>
          <div class="state-icon" aria-hidden="true">📭</div>
          <h3>No todos yet</h3>
          <p>Add your first todo above to get started!</p>
        </div>

        <!-- Error -->
        <div id="error-state" class="state-view error-view" hidden role="alert">
          <div class="state-icon" aria-hidden="true">⚠️</div>
          <h3>Something went wrong</h3>
          <p id="error-message"></p>
          <button onclick="location.reload()" class="btn btn-secondary">Retry</button>
        </div>

        <!-- List -->
        <ul id="todos-list" class="todos-list" aria-label="Todo items"></ul>
      </section>

    </main>

    <!-- ── Footer ─────────────────────────────────── -->
    <footer>
      <p>Created with ❤️ using Bob AI Assistant</p>
    </footer>

  </div><!-- /.container -->

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
